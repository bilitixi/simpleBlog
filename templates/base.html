{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static '/simpleBlog/style.css' %}">
    <meta charset="UTF-8">
    <title>
       {% block title %}
            Home
       {% endblock %}
    </title>
</head>
<body>
<!-- As a heading -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
      <a class="nav-link active" aria-current="page" href={%url 'index' %}>Home</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
         <a class="nav-link" href=" {%url 'post_list' %} ">Post List</a>
        </li>
       <li class="nav-item">
         <a class="nav-link" href=" {%url 'create_users' %} ">Create User</a>
        </li>
          <li class="nav-item">
          <a class="nav-link" href=" {%url 'create_category' %} ">Create Category</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Dropdown
          </a>
           <ul class="dropdown-menu">
               {% if not user.is_authenticated %}
            <li> <a class="navbar-brand" href={%url 'register' %}> Register </a></li>
             <li><a class="navbar-brand" href={%url 'login' %}> Login </a></li>
               {% else %}
                   <form action="{% url 'logout' %}" method="post">
                       {% csrf_token %}
                       <button type="submit" class="btn btn-link">{{ user.username }} Logout</button>
                   </form>

               {% endif %}
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li>
      </ul>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </div>
</nav>

 {% block content %}


 {% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
