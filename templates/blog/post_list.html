{% extends 'base.html' %}
{% block title %}
    Post List
{% endblock %}
{% block content %}
    <ul>
    {% for post in object_list %}
        <li>
        <h2>{{ post.title }}</h2>
        <p>{{ post.author }}</p>
        <p>{{ post.post_date }}</p>
        </li>
    {% endfor %}
    </ul>
{% endblock %}
